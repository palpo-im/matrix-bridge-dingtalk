version: '3.8'

services:
  matrix-bridge-dingtalk:
    build: .
    container_name: matrix-bridge-dingtalk
    ports:
      - "8080:8080"  # Matrix appservice API & Webhook
    volumes:
      - ./config.yaml:/config/config.yaml:ro
      - ./appservices/dingtalk-registration.yaml:/config/appservices/dingtalk-registration.yaml:ro
      - ./data:/data
    environment:
      - RUST_LOG=info
      - DINGTALK_WEBHOOK_URL=${DINGTALK_WEBHOOK_URL:-https://oapi.dingtalk.com/robot/send}
      - DINGTALK_ACCESS_TOKEN=${DINGTALK_ACCESS_TOKEN}
      - DINGTALK_SECRET=${DINGTALK_SECRET}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - matrix

networks:
  matrix:
    driver: bridge
